name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS x64
            os: macos-15-intel
            arch: x64
            builder-args: --mac dmg zip --x64
            artifact-name: OpenClaw-Desktop-mac-x64
          - name: macOS arm64
            os: macos-latest
            arch: arm64
            builder-args: --mac dmg zip --arm64
            artifact-name: OpenClaw-Desktop-mac-arm64
          - name: Windows x64
            os: windows-latest
            arch: x64
            builder-args: --win nsis portable --x64
            artifact-name: OpenClaw-Desktop-win-x64
          - name: Windows arm64
            os: windows-11-arm
            arch: arm64
            builder-args: --win nsis portable --arm64
            artifact-name: OpenClaw-Desktop-win-arm64
          - name: Linux x64
            os: ubuntu-latest
            arch: x64
            builder-args: --linux AppImage deb rpm tar.gz --x64
            artifact-name: OpenClaw-Desktop-linux-x64
          - name: Linux arm64
            os: ubuntu-latest
            arch: arm64
            builder-args: --linux AppImage deb rpm tar.gz --arm64
            artifact-name: OpenClaw-Desktop-linux-arm64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Install dependencies
        run: npm ci

      - name: Install Linux package dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libopenjp2-tools rpm

      - name: Build renderer and Electron main process
        run: npm run build

      - name: Package desktop app
        run: npx electron-builder ${{ matrix.builder-args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            release/*.AppImage
            release/*.blockmap
            release/*.deb
            release/*.dmg
            release/*.exe
            release/*.rpm
            release/*.tar.gz
            release/*.yml
            release/*.yaml
            release/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate SHA256 checksums
        run: find artifacts -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            SHA256SUMS.txt
          generate_release_notes: true
