<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/src/assets/apple-touch-icon.png" />
    <link rel="apple-touch-icon" href="/src/assets/apple-touch-icon.png" />
    <title>OpenClaw Desktop</title>
    <style>
      body {
        margin: 0;
      }
      .app-loading {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        height: 100vh;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition: background 180ms ease;
      }
      .app-loading--dark {
        background:
          radial-gradient(circle at 20% 26%, rgba(34, 211, 238, 0.26), transparent 34%),
          radial-gradient(circle at 78% 72%, rgba(255, 138, 120, 0.16), transparent 30%),
          linear-gradient(135deg, #08111f 0%, #10283a 54%, #0f172a 100%);
        color: rgba(255, 255, 255, 0.74);
      }
      .app-loading--light {
        background:
          radial-gradient(circle at 24% 24%, rgba(34, 211, 238, 0.22), transparent 34%),
          radial-gradient(circle at 76% 74%, rgba(255, 138, 120, 0.24), transparent 30%),
          linear-gradient(135deg, #f9fbfb 0%, #edf9fb 48%, #fff4ef 100%);
        color: rgba(15, 23, 42, 0.58);
      }
      .app-loading__logo {
        display: none;
        width: min(380px, 76vw);
        filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.26));
        animation: appLogoReveal 2.2s ease-in-out infinite;
      }
      .app-loading__icon-wrap {
        position: relative;
        display: none;
        width: 130px;
        height: 130px;
        place-items: center;
      }
      .app-loading__icon-wrap::before,
      .app-loading__icon-wrap::after {
        content: '';
        position: absolute;
        inset: -20px;
        border: 1px solid rgba(34, 211, 238, 0.42);
        border-radius: 999px;
        animation: appOrbitPulse 1.8s ease-in-out infinite;
      }
      .app-loading__icon-wrap::after {
        inset: -34px;
        border-color: rgba(255, 138, 120, 0.38);
        animation-delay: 0.3s;
      }
      .app-loading__icon {
        width: 112px;
        height: 112px;
        animation: appIconFloat 1.8s ease-in-out infinite;
        filter: drop-shadow(0 18px 24px rgba(8, 17, 31, 0.22));
      }
      .app-loading--dark .app-loading__logo {
        display: block;
      }
      .app-loading--light .app-loading__icon-wrap {
        display: grid;
      }
      .app-loading__name {
        position: absolute;
        bottom: 28px;
        font-size: 12px;
        letter-spacing: 0.08em;
      }
      @keyframes appLogoReveal {
        0% {
          opacity: 0.58;
          transform: translateY(8px) scale(0.98);
        }
        38% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0.72;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes appOrbitPulse {
        0% {
          opacity: 0;
          transform: scale(0.82);
        }
        38% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: scale(1.18);
        }
      }
      @keyframes appIconFloat {
        0%,
        100% {
          transform: translateY(4px) scale(0.98);
        }
        45% {
          transform: translateY(-3px) scale(1);
        }
      }
    </style>
    <script>
      (function () {
        var electronTheme = window.electronAPI?.startupThemeMode;
        var systemTheme =
          window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        window.__openclawStartupThemeMode =
          electronTheme === 'light' || electronTheme === 'dark' ? electronTheme : systemTheme;
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading app-loading--dark" id="openclaw-startup-loading">
        <img
          class="app-loading__logo"
          src="/assets/brand/openclaw-desktop-logo-light-transparent-1200x360.png"
          alt="OpenClaw Desktop"
        />
        <div class="app-loading__icon-wrap" aria-hidden="true">
          <img class="app-loading__icon" src="/assets/brand/openclaw-app-icon-256.png" alt="" />
        </div>
        <div class="app-loading__name">OPENCLAW DESKTOP</div>
      </div>
    </div>
    <script>
      (function () {
        var loading = document.getElementById('openclaw-startup-loading');
        var mode = window.__openclawStartupThemeMode === 'light' ? 'light' : 'dark';
        if (loading) {
          loading.className = 'app-loading app-loading--' + mode;
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
